<!doctype html>
<html lang="lv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maršruta izveide | Autoostas informācijas sistēma</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html#search">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M7 6h18a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-1.2a3.2 3.2 0 0 1-6.2 0h-7.2a3.2 3.2 0 0 1-6.2 0H3V10a4 4 0 0 1 4-4Zm1 4v6h8V10H8Zm10 0v6h6v-5a1 1 0 0 0-1-1h-5ZM7.3 24.8a1.3 1.3 0 1 0 0-2.6 1.3 1.3 0 0 0 0 2.6Zm13.4 0a1.3 1.3 0 1 0 0-2.6 1.3 1.3 0 0 0 0 2.6Z"></path>
          </svg>
        </span>
        <span>
          <strong>Autoosta</strong>
          <small>informācijas sistēma</small>
        </span>
      </a>

      <section class="userbar" aria-label="Šofera panelis">
        <button class="profile-chip" type="button" disabled>
          <span id="userFullName">Lietotājs</span>
          <span class="driver-badge is-hidden" id="driverBadge">Autobusa vadītājs</span>
        </button>
        <a class="ghost-btn compact" href="index.html#driverPanel">Atpakaļ</a>
      </section>
    </header>

    <main class="route-page-main">
      <section class="page-header">
        <p class="eyebrow">Šofera zona</p>
        <h1 id="routePageTitle">Jauns maršruts</h1>
        <p id="routePageSubtitle">Ievadi sākumu, galapunktu, cenu, laikus un pieturvietas. Saglabātais reiss parādīsies kopējā maršrutu sarakstā.</p>
      </section>

      <section class="panel route-guard is-hidden" id="routeGuard"></section>

      <section class="panel route-editor-panel" id="routeEditor">
        <form class="driver-form" id="routeForm">
          <input type="hidden" id="editingRouteId">
          <div class="form-row two">
            <label>
              <span>Reisa nosaukums</span>
              <input id="routeNameInput" type="text" placeholder="Rīga - Liepāja ekspresis" required>
            </label>
            <label>
              <span>Cena EUR</span>
              <input id="routePriceInput" type="number" min="0.01" step="0.01" placeholder="12.50" required>
            </label>
          </div>

          <div class="form-row two">
            <label>
              <span>Sākums</span>
              <input id="routeStartInput" type="text" placeholder="Rīga" required>
            </label>
            <label>
              <span>Galapunkts</span>
              <input id="routeEndInput" type="text" placeholder="Liepāja" required>
            </label>
          </div>

          <section class="schedule-editor" aria-labelledby="scheduleEditorTitle">
            <div class="stops-title">
              <span id="scheduleEditorTitle">Reisa laiki</span>
              <div class="mode-switch" role="group" aria-label="Laiku ievades veids">
                <button class="mode-btn active" id="manualModeBtn" type="button" data-schedule-mode="manual">Manuāli</button>
                <button class="mode-btn" id="repeatModeBtn" type="button" data-schedule-mode="repeat">Atkārtojas</button>
              </div>
            </div>

            <div class="schedule-mode-panel" id="manualSchedulePanel">
              <div class="manual-times-list" id="manualTimesList"></div>
              <button class="ghost-btn compact" id="addManualTimeBtn" type="button">Pievienot laiku</button>
            </div>

            <div class="schedule-mode-panel is-hidden" id="repeatSchedulePanel">
              <div class="form-row two">
                <label>
                  <span>No cikiem</span>
                  <input id="recurrenceStartInput" type="time">
                </label>
                <label>
                  <span>Līdz cikiem</span>
                  <input id="recurrenceEndInput" type="time">
                </label>
              </div>
              <div class="form-row two">
                <label>
                  <span>Atkārtojas ik pēc</span>
                  <select id="recurrenceIntervalInput">
                    <option value="60" selected>1h</option>
                    <option value="120">2h</option>
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="90">1h 30 min</option>
                    <option value="180">3h</option>
                  </select>
                </label>
                <label>
                  <span>Brauciena ilgums minūtēs</span>
                  <input id="recurrenceDurationInput" type="number" min="1" max="1440" step="1" value="60">
                </label>
              </div>
              <div class="schedule-preview" id="recurrencePreview"></div>
            </div>
          </section>

          <div class="stops-editor">
            <div class="stops-title">
              <span>Pieturvietas pa vidu</span>
              <button class="small-icon-btn" id="appendStopBtn" type="button" aria-label="Pievienot pieturvietu beigās" title="Pievienot pieturvietu beigās">+</button>
            </div>
            <div id="stopsList"></div>
          </div>

          <div class="form-actions split-actions">
            <a class="ghost-btn" href="index.html#driverPanel">Atcelt</a>
            <button class="primary-btn" id="saveRouteBtn" type="submit">Saglabāt maršrutu</button>
          </div>
        </form>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="route-page.js"></script>
  </body>
</html>
